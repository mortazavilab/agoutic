name: agoutic_core
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12                # High performance, better async support
  - pip
  - pip:
    # --- The Interface ---
    - streamlit==1.52.0        # Pinned per requirement
    - watchdog                 # For Streamlit auto-reload during dev
    
    # --- The Backend/API ---
    - fastmcp
    - fastapi
    - uvicorn[standard]        # 'standard' includes 'uvloop' for speed
    - python-multipart
    
    # --- Authentication ---
    - authlib                  # OAuth 2.0 client for Google OAuth
    
    # --- The Logic & MCP ---
    - mcp                      # Model Context Protocol SDK
    - pydantic>=2.0            # Data validation
    - requests
    - httpx                    # Async HTTP client
    
    # --- The Database ---
    - sqlalchemy>=2.0
    - aiosqlite                # Async SQLite driver
    
    # --- Observability ---
    - structlog                # Structured logging (JSON lines)
    
    # --- AI Integration ---
    - openai                   # Compatible with OpenAI and local vLLM
    - tiktoken
    
    # --- Visualization ---
    - plotly>=5.18.0           # Interactive charts (st.plotly_chart)

    # --- Testing ---
    - pytest>=7.0
    - pytest-asyncio>=0.21.0   # Async test support
    - pytest-cov>=4.0          # Coverage reporting
    - pytest-mock>=3.12        # Cleaner mocking with mocker fixture
    - respx>=0.21              # httpx request mocking
    - factory-boy>=3.3         # Test data factories
    - aiohttp>=3.8.0           # Async HTTP client for tests
